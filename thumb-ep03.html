<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400;1,9..144,500&family=Inter:wght@600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1280px;height:720px;overflow:hidden}
  .stage{width:1280px;height:720px;position:relative;overflow:hidden;
    background:
      radial-gradient(55% 70% at 88% 12%,rgba(193,154,61,.38) 0%,transparent 58%),
      radial-gradient(60% 80% at 4% 95%,rgba(209,44,106,.28) 0%,transparent 60%),
      linear-gradient(152deg,#16130E,#2B2418)}
  .wm{position:absolute;top:44px;left:64px;font-family:'Fraunces',serif;font-size:30px;color:#F6F0E4}
  .wm em{font-style:italic;color:#DCBC69}
  .kicker{position:absolute;top:132px;left:64px;font-family:'Inter',sans-serif;font-size:20px;font-weight:700;
    letter-spacing:.32em;color:#DCBC69}
  .title{position:absolute;top:190px;left:60px;width:700px;font-family:'Fraunces',serif;font-weight:500;
    font-size:98px;line-height:1.05;color:#F6F0E4;letter-spacing:-1px}
  .title em{font-style:italic;font-weight:400;color:#D12C6A}
  .chip{position:absolute;left:64px;bottom:74px;display:flex;align-items:center;gap:16px;
    background:rgba(24,20,14,.55);border:1px solid rgba(255,255,255,.3);border-radius:999px;
    padding:18px 34px;backdrop-filter:blur(18px);box-shadow:0 12px 40px rgba(15,12,6,.4)}
  .chip span{font-family:'Inter',sans-serif;font-size:24px;font-weight:700;letter-spacing:.08em;color:#F6F0E4}
  .chip b{font-family:'Fraunces',serif;font-style:italic;font-weight:500;font-size:28px;color:#DCBC69}
  .still{position:absolute;right:54px;bottom:60px;width:520px;background:#fff;padding:12px 12px 40px;
    transform:rotate(3deg);box-shadow:0 30px 80px rgba(5,4,2,.65)}
  .still img{width:100%;display:block}
  .tape{position:absolute;width:110px;height:30px;background:rgba(244,163,0,.55);top:-14px;left:50%;margin-left:-55px;transform:rotate(-5deg)}
  .grain{position:absolute;inset:0;background:radial-gradient(120% 90% at 50% 10%,transparent 60%,rgba(10,8,4,.35) 100%)}
</style></head>
<body>
<div class="stage">
  <div class="grain"></div>
  <div class="wm">Prompt <em>Atelier</em></div>
  <div class="kicker">EPISODE 03</div>
  <div class="title">Paper, scissors, <em>prompts</em></div>
  <div class="still"><div class="tape"></div><img src="ep03/s02-end.jpg" alt=""></div>
  <div class="chip"><span>a Vox-style film</span><b>from two keyframes →</b></div>
</div>
</body>
</html>
