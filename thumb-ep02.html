<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Inter:wght@600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1280px;height:720px;overflow:hidden}
  .stage{width:1280px;height:720px;position:relative;overflow:hidden;
    background:
      radial-gradient(55% 70% at 88% 12%,rgba(193,154,61,.38) 0%,transparent 58%),
      radial-gradient(60% 80% at 4% 95%,rgba(51,98,92,.5) 0%,transparent 60%),
      linear-gradient(152deg,#16130E,#2B2418)}
  .wm{position:absolute;top:44px;left:64px;font-family:'Fraunces',serif;font-size:30px;color:#F6F0E4}
  .wm em{font-style:italic;color:#DCBC69}
  .kicker{position:absolute;top:132px;left:64px;font-family:'Inter',sans-serif;font-size:20px;font-weight:700;
    letter-spacing:.32em;color:#DCBC69}
  .title{position:absolute;top:190px;left:60px;width:720px;font-family:'Fraunces',serif;font-weight:500;
    font-size:96px;line-height:1.06;color:#F6F0E4;letter-spacing:-1px}
  .title em{font-style:italic;font-weight:400;color:#DCBC69}
  .chip{position:absolute;left:64px;bottom:74px;display:flex;align-items:center;gap:16px;
    background:rgba(24,20,14,.55);border:1px solid rgba(255,255,255,.3);border-radius:999px;
    padding:18px 34px;backdrop-filter:blur(18px);box-shadow:0 12px 40px rgba(15,12,6,.4)}
  .chip span{font-family:'Inter',sans-serif;font-size:24px;font-weight:700;letter-spacing:.08em;color:#F6F0E4}
  .chip b{font-family:'Fraunces',serif;font-style:italic;font-weight:500;font-size:28px;color:#DCBC69}
  .still{position:absolute;right:58px;bottom:-6px;width:430px;height:430px;border-radius:26%;overflow:hidden;
    border:2px solid rgba(255,255,255,.6);outline:2px solid rgba(220,188,105,.75);outline-offset:6px;
    box-shadow:0 30px 80px rgba(5,4,2,.65);transform:rotate(2deg)}
  .still img{width:100%;height:100%;object-fit:cover;object-position:50% 45%}
  .grain{position:absolute;inset:0;background:radial-gradient(120% 90% at 50% 10%,transparent 60%,rgba(10,8,4,.35) 100%)}
</style>
</head>
<body>
<div class="stage">
  <div class="grain"></div>
  <div class="wm">Prompt <em>Atelier</em></div>
  <div class="kicker">EPISODE 02</div>
  <div class="title">One spreadsheet, <em>one agent</em></div>
  <div class="still"><img src="ep02/studio.jpg" alt=""></div>
  <div class="chip"><span>an AI-produced podcast</span><b>for Chubletz →</b></div>
</div>
</body>
</html>
