<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,300;1,9..144,400;1,9..144,500&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1080px;height:1080px;overflow:hidden}
  .stage{width:1080px;height:1080px;position:relative;display:flex;align-items:center;justify-content:center;
    background:
      radial-gradient(70% 70% at 50% 30%,rgba(193,154,61,.22) 0%,transparent 65%),
      radial-gradient(60% 60% at 78% 88%,rgba(51,98,92,.32) 0%,transparent 62%),
      linear-gradient(150deg,#14110C,#292216)}
  .tile{width:560px;height:560px;border-radius:150px;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(148deg,#26221A,#17140F);
    border:2px solid rgba(220,188,105,.55);
    box-shadow:0 50px 140px rgba(5,4,2,.7), inset 0 1px 0 rgba(255,255,255,.12)}
  .mono{font-family:'Fraunces',serif;font-size:300px;line-height:1;letter-spacing:-12px;margin-top:-24px}
  .mono .p{font-style:italic;font-weight:400;color:#DCBC69}
  .mono .a{font-style:italic;font-weight:300;font-size:215px;color:#F6F0E4}
</style></head>
<body>
  <div class="stage">
    <div class="tile"><div class="mono"><span class="p">P</span><span class="a">a</span></div></div>
  </div>
</body></html>
